<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Dashed block boundary rectangle -->
  <rect x="8" y="8" width="80" height="80" fill="none" stroke="#808080" stroke-width="6" stroke-dasharray="10,5"/>
  <!-- Interior geometry representing grouped objects: a diagonal line -->
  <line x1="26" y1="64" x2="64" y2="26" stroke="#808080" stroke-width="6"/>
  <!-- Small circle representing another grouped object -->
  <circle cx="30" cy="30" r="10" fill="none" stroke="#808080" stroke-width="6"/>
  <!-- Insertion point (red dot) at bottom-left corner -->
  <circle cx="8" cy="88" r="6" fill="#ff0000"/>
</svg>
