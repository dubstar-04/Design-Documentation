<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Dynamite body rotated 45 degrees, body centre mapped to (48,48) -->
  <g transform="rotate(45, 51, 44)">
    <!-- Body -->
    <rect x="34" y="20" width="36" height="58" fill="#808080"/>
    <!-- Cap -->
    <rect x="34" y="20" width="36" height="10" fill="#606060"/>
  </g>
  <!-- Fuse cord (starts at rotated cap top-centre ~69,28, curves to top-right) -->
  <path d="M 69 28 C 76 18 80 12 88 8" fill="none" stroke="#808080" stroke-width="4" stroke-linecap="round"/>
  <!-- Spark at lit end of fuse (red dot) -->
  <circle cx="88" cy="8" r="5" fill="#ff0000"/>
</svg>
