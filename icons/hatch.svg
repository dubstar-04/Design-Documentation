<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Outer rectangle border -->
  <rect x="8" y="8" width="80" height="80" fill="none" stroke="#808080" stroke-width="6"/>
  <!-- 45-degree diagonal hatch lines clipped to the rectangle interior -->
  <!-- Each line goes from (8,y) to (y-8+8, 8) i.e. bottom-left to top-right -->
  <line x1="8" y1="28" x2="28" y2="8"   stroke="#808080" stroke-width="3"/>
  <line x1="8" y1="48" x2="48" y2="8"   stroke="#808080" stroke-width="3"/>
  <line x1="8" y1="68" x2="68" y2="8"   stroke="#808080" stroke-width="3"/>
  <line x1="8" y1="88" x2="88" y2="8"   stroke="#808080" stroke-width="3"/>
  <line x1="28" y1="88" x2="88" y2="28" stroke="#808080" stroke-width="3"/>
  <line x1="48" y1="88" x2="88" y2="48" stroke="#808080" stroke-width="3"/>
  <line x1="68" y1="88" x2="88" y2="68" stroke="#808080" stroke-width="3"/>
</svg>
