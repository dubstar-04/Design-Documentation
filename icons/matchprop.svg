<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Source object: filled gray rectangle (left) -->
  <rect x="8" y="28" width="28" height="40" fill="#808080"/>
  <!-- Destination object: outlined rectangle (right), receives the properties -->
  <rect x="60" y="28" width="28" height="40" fill="none" stroke="#808080" stroke-width="6"/>
  <!-- Arrow from source to destination -->
  <line x1="40" y1="48" x2="56" y2="48" stroke="#808080" stroke-width="6"/>
  <!-- Arrowhead -->
  <polygon points="56,42 56,54 68,48" fill="#808080"/>
</svg>
