<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   width="96"
   height="96"
   viewBox="0 0 96 96">
  <!-- Mirror icon: two rectangles reflected across a vertical dashed centre line -->
  <!-- Left shape -->
  <rect x="8" y="24" width="32" height="20" rx="2"
        style="fill:#808080;fill-opacity:1;stroke:none"/>
  <rect x="8" y="52" width="20" height="20" rx="2"
        style="fill:#808080;fill-opacity:1;stroke:none"/>
  <!-- Mirror axis (dashed vertical line) -->
  <line x1="48" y1="8" x2="48" y2="88"
        style="fill:none;stroke:#808080;stroke-width:3;stroke-dasharray:6,4;stroke-linecap:round"/>
  <!-- Right shape (mirrored) -->
  <rect x="56" y="24" width="32" height="20" rx="2"
        style="fill:#808080;fill-opacity:0.45;stroke:none"/>
  <rect x="68" y="52" width="20" height="20" rx="2"
        style="fill:#808080;fill-opacity:0.45;stroke:none"/>
</svg>
