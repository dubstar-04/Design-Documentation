<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <!-- Trash can lid -->
  <line x1="18" y1="32" x2="78" y2="32" stroke="#808080" stroke-width="6"/>
  <!-- Lid handle (small arc above the lid centre) -->
  <path d="M 36 32 Q 48 18 60 32" fill="none" stroke="#808080" stroke-width="6"/>
  <!-- Trash can body -->
  <rect x="24" y="36" width="48" height="52" rx="4" fill="none" stroke="#808080" stroke-width="6"/>
  <!-- Vertical lines inside (unused items being removed) -->
  <line x1="38" y1="46" x2="38" y2="78" stroke="#808080" stroke-width="4"/>
  <line x1="48" y1="46" x2="48" y2="78" stroke="#808080" stroke-width="4"/>
  <line x1="58" y1="46" x2="58" y2="78" stroke="#808080" stroke-width="4"/>
</svg>
